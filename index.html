<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDGs Key Phrases</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Thai','Space Grotesk',sans-serif;background:#f5f6f8;color:#1a1a2e;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.header{text-align:center;margin-bottom:40px}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e4ea;border-radius:100px;padding:6px 16px;font-size:13px;color:#6b7280;margin-bottom:20px;letter-spacing:.5px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.header-badge .dot{width:6px;height:6px;border-radius:50%;background:#4C9F38;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;color:#1a1a2e;line-height:1.2;margin-bottom:6px}
.header .uni-name{font-size:16px;font-weight:500;color:#6b7280;margin-bottom:14px}
.header p{color:#8b92a8;font-size:15px;max-width:600px;margin:0 auto}
.sdg-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:40px}
.sdg-bar span{flex:1}
.input-section{background:#fff;border:1px solid #e2e4ea;border-radius:20px;padding:36px;margin-bottom:32px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.input-section h2{font-size:18px;font-weight:600;margin-bottom:6px;color:#1a1a2e}
.input-section .subtitle{font-size:13px;color:#8b92a8;margin-bottom:28px}
.field-group{margin-bottom:24px}.field-group:last-of-type{margin-bottom:0}
.field-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.field-label .num{width:20px;height:20px;border-radius:6px;background:#f0f1f5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#1a1a2e}
input[type="text"],textarea{width:100%;background:#f8f9fb;border:1px solid #e2e4ea;border-radius:12px;padding:14px 18px;color:#1a1a2e;font-size:15px;font-family:'IBM Plex Sans Thai',sans-serif;transition:all .2s;outline:none}
input[type="text"]:focus,textarea:focus{border-color:#4C9F38;box-shadow:0 0 0 3px rgba(76,159,56,.1);background:#fff}
textarea{resize:vertical;min-height:120px;line-height:1.6}
input::placeholder,textarea::placeholder{color:#b0b5c3}
.btn-row{display:flex;gap:12px;margin-top:28px}
.btn-analyze{flex:1;padding:16px 32px;background:linear-gradient(135deg,#4C9F38,#3a7a2b);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;font-family:'IBM Plex Sans Thai',sans-serif;cursor:pointer;transition:all .25s;letter-spacing:.3px}
.btn-analyze:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(76,159,56,.25)}
.btn-clear{padding:16px 28px;background:#f0f1f5;border:1px solid #e2e4ea;border-radius:14px;color:#6b7280;font-size:15px;font-weight:500;font-family:'IBM Plex Sans Thai',sans-serif;cursor:pointer;transition:all .2s}
.btn-clear:hover{background:#e5e7ed;color:#1a1a2e}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.results-header h2{font-size:20px;font-weight:600;color:#1a1a2e}
.results-header .stat{font-size:13px;color:#8b92a8}
.sdg-results{display:flex;flex-direction:column;gap:12px}
.sdg-card{background:#fff;border:1px solid #e2e4ea;border-radius:16px;overflow:hidden;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.sdg-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sdg-card.primary{border-color:#4C9F38;border-width:2px;box-shadow:0 2px 12px rgba(76,159,56,.1)}
.sdg-card-header{display:flex;align-items:center;gap:16px;padding:20px 24px;cursor:pointer}
.sdg-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.sdg-card-info{flex:1;min-width:0}
.sdg-card-title{font-size:15px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sdg-card-title .badge-primary{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;background:rgba(76,159,56,.12);color:#3a7a2b;text-transform:uppercase;letter-spacing:.5px}
.sdg-card-title .badge-related{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;background:rgba(253,157,36,.12);color:#c47a10;text-transform:uppercase;letter-spacing:.5px}
.sdg-card-desc{font-size:12px;color:#8b92a8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdg-card-score{text-align:right;flex-shrink:0}
.sdg-card-score .score-val{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}
.sdg-card-score .score-label{font-size:11px;color:#8b92a8;margin-top:2px}
.sdg-progress{height:3px;background:#f0f1f5}
.sdg-progress-fill{height:100%;transition:width .6s ease}
.sdg-card-body{padding:0 24px 20px;display:none}
.sdg-card.expanded .sdg-card-body{display:block}
.matched-keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.kw-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;background:#f5f6f8;border:1px solid #e2e4ea;font-size:13px;color:#1a1a2e}
.kw-tag .kw-weight{font-family:'Space Grotesk',sans-serif;font-size:11px;color:#8b92a8;font-weight:500}
.no-results{text-align:center;padding:60px 20px;color:#8b92a8}
.no-results .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.no-results p{font-size:15px}
.summary-chart{background:#fff;border:1px solid #e2e4ea;border-radius:20px;padding:28px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.summary-chart h3{font-size:14px;font-weight:500;color:#6b7280;margin-bottom:20px;text-transform:uppercase;letter-spacing:.5px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:30px;position:relative}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.chart-bar{width:100%;border-radius:5px 5px 0 0;min-height:2px;transition:height .5s ease;cursor:pointer;position:relative}
.chart-bar:hover{opacity:.85}
.chart-bar-label{font-size:11px;color:#6b7280;margin-top:8px;font-family:'Space Grotesk',sans-serif;font-weight:600}
.chart-rank{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fff;background:#1a1a2e;border-radius:4px;padding:1px 6px;white-space:nowrap;font-family:'Space Grotesk',sans-serif;display:none}
.chart-rank.show{display:block}
.chart-rank.rank-1{background:#E5243B}
.chart-rank.rank-2{background:#FD6925}
.chart-rank.rank-3{background:#FCC30B;color:#1a1a2e}
.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.expand-icon{color:#b0b5c3;font-size:18px;transition:transform .2s;flex-shrink:0}
.sdg-card.expanded .expand-icon{transform:rotate(180deg)}
@media(max-width:640px){.container{padding:24px 16px 60px}.header h1{font-size:28px}.input-section{padding:24px 20px}.sdg-card-header{padding:16px;gap:12px}.sdg-icon{width:40px;height:40px;font-size:15px;border-radius:10px}.sdg-card-score .score-val{font-size:20px}.btn-row{flex-direction:column}.chart-bar-label{font-size:9px}.chart-rank{font-size:8px;padding:1px 4px}}
</style>
</head>

  <div class="sdg-bar" id="sdgBar"></div>
  <div class="input-section">
    <h2>กรอกข้อมูลเพื่อวิเคราะห์</h2>

    </div>
    <div class="field-group">
      <label class="field-label"><span class="num">2</span> Abstract / บทคัดย่อ</label>
      <textarea id="inputAbstract" placeholder="วางบทคัดย่อของงานวิจัยที่นี่..."></textarea>
    </div>
    <div class="field-group">
      <label class="field-label"><span class="num">3</span> Keywords / คำสำคัญ</label>
      <input type="text" id="inputKeywords" placeholder="เช่น ocean, conservation, pollution, coral reef">
    </div>
    <div class="btn-row">

      <button class="btn-clear" onclick="clearAll()">ล้างข้อมูล</button>
    </div>
  </div>
  <div id="resultsSection" style="display:none"></div>
</div>

const sdgBar=document.getElementById('sdgBar');
for(let i=1;i<=16;i++){const s=document.createElement('span');s.style.background=SDG_COLORS[i];sdgBar.appendChild(s)}
function analyze(){
  const title=document.getElementById('inputTitle').value.trim();
  const abstract=document.getElementById('inputAbstract').value.trim();
  const keywords=document.getElementById('inputKeywords').value.trim();
  if(!title&&!abstract&&!keywords){alert('กรุณากรอกข้อมูลอย่างน้อย 1 ช่อง');return}
  const fullText=[title,abstract,keywords].filter(Boolean).join(' ').toLowerCase();
  const results=[];
  for(let sdg=1;sdg<=16;sdg++){
    const kwList=KEYWORDS_BY_SDG[sdg];let totalScore=0;const matched=[];
    const sorted=[...kwList].sort((a,b)=>b[0].length-a[0].length);
    for(const[kw,weight]of sorted){
      const regex=new RegExp('\\b'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');
      const matches=fullText.match(regex);
      if(matches){totalScore+=weight*matches.length;matched.push({keyword:kw,weight,count:matches.length})}
    }
    if(totalScore>0)results.push({sdg,score:Math.round(totalScore*100)/100,matched:matched.sort((a,b)=>b.weight-a.weight)});
  }
  results.sort((a,b)=>b.score-a.score);
  const rankMap={};results.forEach((r,i)=>{rankMap[r.sdg]=i+1});
  renderResults(results,rankMap);
}
function renderResults(results,rankMap){
  const section=document.getElementById('resultsSection');section.style.display='block';
  if(results.length===0){section.innerHTML='<div class="no-results fade-in"><div class="icon">🔍</div><p>ไม่พบคำสำคัญที่ตรงกับ SDGs ใดๆ<br>ลองเพิ่มเนื้อหาหรือใช้คำภาษาอังกฤษ</p></div>';return}
  const maxScore=results[0].score;const primaryThreshold=maxScore*0.5;let html='';
  html+='<div class="summary-chart fade-in"><h3>ภาพรวมคะแนน SDGs ทั้งหมด</h3><div class="chart-bars">';
  for(let i=1;i<=16;i++){
    const r=results.find(x=>x.sdg===i);const score=r?r.score:0;
    const pct=maxScore>0?(score/maxScore*100):0;const h=Math.max(2,pct*1.4);
    const rank=rankMap[i];let rankHtml='';
    if(rank&&rank<=5){const rc=rank<=3?'rank-'+rank:'';rankHtml='<span class="chart-rank show '+rc+'">#'+rank+'</span>'}
    html+='<div class="chart-bar-wrap"><div class="chart-bar" style="height:'+h+'px;background:'+SDG_COLORS[i]+'" title="SDG '+i+': '+score+'">'+rankHtml+'</div><div class="chart-bar-label">'+i+'</div></div>';
  }
  html+='</div></div>';
  const totalMatched=results.reduce((s,r)=>s+r.matched.length,0);
  html+='<div class="results-header fade-in"><h2>ผลการวิเคราะห์</h2><div class="stat">พบ '+totalMatched+' คำสำคัญ ใน '+results.length+' เป้าหมาย</div></div>';
  html+='<div class="sdg-results">';
  results.forEach((r,idx)=>{
    const info=SDG_INFO[r.sdg];const isPrimary=r.score>=primaryThreshold;
    const pct=maxScore>0?(r.score/maxScore*100):0;const rank=idx+1;
    html+='<div class="sdg-card '+(isPrimary?'primary':'')+' fade-in" style="animation-delay:'+idx*0.05+'s" id="card-'+r.sdg+'">';
    html+='<div class="sdg-card-header" onclick="toggleCard('+r.sdg+')">';
    html+='<div class="sdg-icon" style="background:'+SDG_COLORS[r.sdg]+'">'+r.sdg+'</div>';
    html+='<div class="sdg-card-info"><div class="sdg-card-title">';
    html+='<span style="color:#8b92a8;font-size:12px;font-weight:700;margin-right:2px">#'+rank+'</span> ';
    html+='SDG '+r.sdg+': '+info.en+' ';
    html+=isPrimary?'<span class="badge-primary">ตรงมากที่สุด</span>':'<span class="badge-related">เกี่ยวข้องบางส่วน</span>';
    html+='</div><div class="sdg-card-desc">'+info.th+'</div></div>';
    html+='<div class="sdg-card-score"><div class="score-val" style="color:'+SDG_COLORS[r.sdg]+'">'+r.score.toFixed(1)+'</div><div class="score-label">'+r.matched.length+' คำที่ตรง</div></div>';
    html+='<span class="expand-icon">▼</span></div>';
    html+='<div class="sdg-progress"><div class="sdg-progress-fill" style="width:'+pct+'%;background:'+SDG_COLORS[r.sdg]+'"></div></div>';
    html+='<div class="sdg-card-body"><div class="matched-keywords">';
    r.matched.forEach(m=>{html+='<span class="kw-tag">'+m.keyword+(m.count>1?' ×'+m.count:'')+' <span class="kw-weight">'+m.weight.toFixed(1)+'</span></span>'});
    html+='</div></div></div>';
  });
  html+='</div>';
  section.innerHTML=html;
  if(results.length>0)document.getElementById('card-'+results[0].sdg).classList.add('expanded');
}
function toggleCard(sdg){document.getElementById('card-'+sdg).classList.toggle('expanded')}
function clearAll(){document.getElementById('inputTitle').value='';document.getElementById('inputAbstract').value='';document.getElementById('inputKeywords').value='';document.getElementById('resultsSection').style.display='none'}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA')analyze()});
